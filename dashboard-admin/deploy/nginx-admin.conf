# Nginx - Dashboard admin sur le même serveur que l'API (HTTPS)
# Hypothèses:
# - Backend Node tourne sur 127.0.0.1:5000
# - Build admin copié dans /var/www/coris/dashboard-admin/dist
# - Dashboard exposé sous /admin
# - Certificats Let's Encrypt déjà générés pour testmobile.online

# Redirection HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name testmobile.online www.testmobile.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name testmobile.online www.testmobile.online;

    # Certificats Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/testmobile.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/testmobile.online/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/testmobile.online/chain.pem;

    # Paramètres SSL recommandés
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Headers sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Dashboard Admin (SPA React/Vite)
    location /admin/ {
        alias /var/www/coris/dashboard-admin/dist/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # API backend mycoris-master
    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
